# docker-compose.yml — PostgreSQL local para pruebas de separacion ETL/Pipeline.
#
# Uso:
#   docker compose up -d
#
# ETL (simula VM):
#   poetry run python scripts/run_bootstrap.py --db-url postgresql://mlmonitor:mlmonitor@localhost:5432/mlmonitor
#   poetry run python scripts/run_incremental_etl.py --db-url postgresql://mlmonitor:mlmonitor@localhost:5432/mlmonitor
#
# Pipeline (simula ECS):
#   poetry run python scripts/run_pipeline.py --db-url postgresql://mlmonitor:mlmonitor@localhost:5432/mlmonitor --no-email --no-llm
#
# Cleanup:
#   docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mlmonitor
      POSTGRES_USER: mlmonitor
      POSTGRES_PASSWORD: mlmonitor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlmonitor"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
